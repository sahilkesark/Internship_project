<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Career Recommendations | Career Recommender</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-gradient"></div>
    <div class="container">
        <header>
            <div class="header-content">
                <h1>Career Recommendations</h1>
                <p class="subtitle">Based on your profile, here are the career options that match your qualifications</p>
            </div>
        </header>

        <main>
            <div id="loading" class="loading-container">
                <div class="loading-spinner"></div>
                <p class="loading-text">Processing your information and matching careers...</p>
            </div>

            <div id="resultsContainer" class="hidden">
                <div class="results-single">
                    <div class="result-header eligible-header">
                        <div class="result-icon">✓</div>
                        <div class="result-header-content">
                            <div class="result-title-row">
                                <h3>Eligible & Suitable</h3>
                                <span class="result-count" id="eligibleCount">0</span>
                            </div>
                            <p class="result-subtitle">These careers match your profile</p>
                        </div>
                    </div>
                    <div id="eligible-list" class="card-list"></div>
                    <div id="prep-plan-action" class="back-link" style="margin-top: 24px;">
                        <!-- Button will be injected by results.js based on top recommendation -->
                    </div>
                </div>

                <div class="back-link">
                    <a href="/" class="link-btn">← Start Over</a>
                </div>
            </div>
        </main>
    </div>
    <script src="{{ url_for('static', filename='results.js') }}"></script>
</body>
</html>
